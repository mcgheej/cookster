<div
  [ckDrop]="dropArea()"
  class="h-full border-r-2 divider-dark relative"
  (click)="clearActivitySelection($event)"
  [matContextMenuTriggerFor]="menu"
  (contextmenu)="onRightClick($event)">
  <ck-resource-action-tiles [resourceLane]="distinctResourceLane()" />
  <ck-activity-tiles [resourceLane]="distinctResourceLane()" />
</div>
<mat-menu #menu>
  <ng-template matMenuContent>
    <button mat-menu-item (click)="createNewActivity($event)">
      <mat-icon>schedule</mat-icon>
      <span>Create New Activity</span>
    </button>
    <button mat-menu-item (click)="createNewResourceAction($event)">
      <mat-icon>electric_bolt</mat-icon>
      <span>Create New Resource Action</span>
    </button>
  </ng-template>
</mat-menu>
